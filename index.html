<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tic-Tac-Toe Game</title>
    <link rel="stylesheet" href="./style.css" type="text/css" />
</head>

<body>
    <!-- Header -->
    <header>
        <div class="msg-container hide">
            <p id="msg"></p>
            <!-- Score-Board -->
            <div class="score-board">
                <!-- Track Score -->
                <div class="score">
                    <!-- Track User Score -->
                    <p id="player1-score">0</p>
                    <p class="player-one-name"></p>
                </div>
                <div class="score">
                    <!-- Track Computer Score -->
                    <p id="player2-score">0</p>
                    <p class="player-two-name"></p>
                </div>
            </div>
            <button id="new-btn">New Game</button>
        </div>
    </header>
    <!-- Main -->
    <main>
        <!-- Heading -->
        <h1>Tic Tac Toe</h1>
        <!-- Container -->
        <div class="container">
            <!-- Game-Container -->
            <div class="game">
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
            </div>
        </div>
        <!-- Reset-Button -->
        <button id="reset-btn">Reset Button</button>
    </main>
    <script src="./app.js"></script>
</body>

</html>
